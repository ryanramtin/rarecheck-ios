name: CardSignal
options:
  bundleIdPrefix: app.cardsignal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  SWIFT_VERSION: "5.10"
  DEVELOPMENT_TEAM: ""   # Fill in your Apple Team ID
  PRODUCT_BUNDLE_IDENTIFIER: app.cardsignal.ios
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  TARGETED_DEVICE_FAMILY: "1"     # iPhone only
  SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"

targets:
  CardSignal:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - CardSignal
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.cardsignal.ios
      DEVELOPMENT_TEAM: ""
      INFOPLIST_FILE: CardSignal/Resources/Info.plist
    info:
      path: CardSignal/Resources/Info.plist
      properties:
        CFBundleName: CardSignal
        CFBundleDisplayName: CardSignal
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSCameraUsageDescription: "CardSignal uses the camera to scan Pokémon cards."
        NSPhotoLibraryUsageDescription: "CardSignal can scan cards from your photo library."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    scheme:
      testTargets:
        - CardSignalTests

  CardSignalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CardSignalTests
    dependencies:
      - target: CardSignal
