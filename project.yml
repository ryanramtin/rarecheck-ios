name: RareCheck
options:
  bundleIdPrefix: app.rarecheck
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4

settings:
  SWIFT_VERSION: "5.10"
  DEVELOPMENT_TEAM: "377C4V6762"
  PRODUCT_BUNDLE_IDENTIFIER: app.rarecheck.ios
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  TARGETED_DEVICE_FAMILY: "1"     # iPhone only
  SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"

targets:
  RareCheck:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - RareCheck
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: app.rarecheck.ios
      DEVELOPMENT_TEAM: "377C4V6762"
      INFOPLIST_FILE: RareCheck/Resources/Info.plist
    info:
      path: RareCheck/Resources/Info.plist
      properties:
        CFBundleName: Poke Rare Check
        CFBundleDisplayName: Poke Rare Check
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        API_BASE_URL: "https://rarecheck-api-production.up.railway.app"
        REVENUECAT_API_KEY: "$(REVENUECAT_API_KEY)"
        NSCameraUsageDescription: "Poke Rare Check uses the camera to scan Pokemon cards."
        NSPhotoLibraryUsageDescription: "Poke Rare Check can scan cards from your photo library."
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    scheme:
      testTargets:
        - RareCheckTests

  RareCheckTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RareCheckTests
        excludes:
          - "Resources/**"
      - path: RareCheckTests/Resources
        type: folder
        buildPhase: resources
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: app.rarecheck.ios.tests
    dependencies:
      - target: RareCheck
